<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Denunciar', ~{::main}, 'denunciar')}">
<body>
<main>
<div class="container">

    <div class="flash flash-sucesso" th:if="${param.sucesso}">
        Denuncia registrada com sucesso! Obrigado por ajudar a proteger outras pessoas.
    </div>

    <div class="form-card">
        <h2 class="form-titulo">Registrar denuncia</h2>
        <p class="form-subtitulo">Preencha os dados da ligacao suspeita que voce recebeu.</p>

        <form th:action="@{/denunciar}" th:object="${denuncia}" method="post">

            <div class="form-group">
                <label for="titulo">Titulo</label>
                <input type="text"
                       id="titulo"
                       th:field="*{titulo}"
                       placeholder="Ex: Ligacao suspeita do Bradesco"/>
            </div>

            <div class="form-group">
                <label for="numero">Número suspeito</label>
                <input type="text"
                       id="numero"
                       th:field="*{numero}"
                       placeholder="Ex: +55 (11) 99999-9999"
                       maxlength="19"
                       autocomplete="off"
                       oninput="mascaraTelefone(this)"/>
            </div>

            <div class="form-group">
                <label for="tipoAmeaca">Tipo de ameaca</label>
                <select id="tipoAmeaca" th:field="*{tipoAmeaca}">
                    <option value="">Selecione...</option>
                    <option value="VIRTUAL">Virtual (golpe online/telefone)</option>
                    <option value="PSICOLOGICA">Psicologica</option>
                    <option value="FISICA">Fisica</option>
                    <option value="OUTRA">Outra</option>
                </select>
            </div>

            <div class="form-group">
                <label for="descricao">O que aconteceu?</label>
                <textarea id="descricao"
                          th:field="*{descricao}"
                          placeholder="Descreva brevemente a ligacao..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-full">
                Enviar denuncia
            </button>

        </form>
    </div>

</div>

<script>
function mascaraTelefone(input) {
    let v = input.value.replace(/\D/g, '');

    if (v.length === 0) { input.value = ''; return; }

    if (v.length <= 2) {
        input.value = '+' + v;
    } else if (v.length <= 4) {
        input.value = '+' + v.substring(0,2) + ' (' + v.substring(2);
    } else if (v.length <= 9) {
        input.value = '+' + v.substring(0,2) + ' (' + v.substring(2,4) + ') ' + v.substring(4);
    } else if (v.length <= 13) {
        input.value = '+' + v.substring(0,2) + ' (' + v.substring(2,4) + ') ' + v.substring(4,9) + '-' + v.substring(9);
    } else {
        v = v.substring(0, 13);
        input.value = '+' + v.substring(0,2) + ' (' + v.substring(2,4) + ') ' + v.substring(4,9) + '-' + v.substring(9);
    }
}
</script>

</main>
</body>
</html>
