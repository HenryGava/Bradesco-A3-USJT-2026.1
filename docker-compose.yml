version: '3.8'

services:
  # -------------------------------------------------------------------
  # SERVIÇO DO BANCO DE DADOS: MySQL 8.0
  # -------------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: sentinela0800-db
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: Sentinela0800
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    # O healthcheck faz o Docker testar se o banco já terminou de ligar de verdade
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5
      interval: 10s

  # -------------------------------------------------------------------
  # SERVIÇO DO BACK-END: Spring Boot (Sua aplicação)
  # -------------------------------------------------------------------
  app:
    build: .
    container_name: sentinela0800-app
    restart: always
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy # Só liga o Spring se o MySQL passar no teste acima
    environment:
      # Injeta dinamicamente as credenciais para o Spring achar o banco dentro do Docker
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
      SPRING_JPA_SHOW_SQL: "${SPRING_JPA_SHOW_SQL}"
      SPRING_THYMELEAF_CACHE: "${SPRING_THYMELEAF_CACHE}"

volumes:
  mysql_data: